name: Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build abstractions
        run: cd packages/abstractions && npx tsc

      - name: Build plugins
        run: |
          cd plugins/filesystem && npx tsc
          cd ../weather && npx tsc
          cd ../filesystem-json && npx tsc
          cd ../filesystem-sqlite && npx tsc
          cd ../filesystem-s3 && npx tsc
          cd ../jobs && npx tsc
          cd ../data-explorer && npx tsc
          cd ../data-explorer-sql && npm install && npx tsc
          cd ../data-explorer-mongo && npm install && npx tsc
          cd ../data-explorer-postgres && npm install && npx tsc
          cd ../data-explorer-mysql && npm install && npx tsc
          cd ../data-explorer-mssql && npm install && npx tsc
          cd ../data-explorer-redis && npm install && npx tsc
          cd ../data-explorer-elasticsearch && npm install && npx tsc
          cd ../admin && npm install && npx tsc
          cd ../aws && npm install && npx tsc

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
