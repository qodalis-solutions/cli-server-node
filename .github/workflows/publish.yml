name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Cannot publish packages."
            exit 1
          fi
          npm whoami --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build abstractions
        run: cd packages/abstractions && npx tsc

      - name: Build plugins (filesystem first, then dependents)
        run: |
          cd plugins/filesystem && npx tsc
          cd ../weather && npx tsc
          cd ../filesystem-json && npx tsc
          cd ../filesystem-sqlite && npx tsc
          cd ../filesystem-s3 && npx tsc
          cd ../jobs && npx tsc
          cd ../admin && npm install && npx tsc

      - name: Build
        run: npm run build

      - name: Publish all packages
        run: |
          publish_pkg() {
            local dir="$1"
            local name
            name=$(node -p "require('./$dir/package.json').name")
            echo "::group::Publishing $name from $dir"
            local output
            if output=$(cd "$dir" && npm publish --access public 2>&1); then
              echo "$output"
              echo "Successfully published $name"
            else
              echo "$output"
              if echo "$output" | grep -qE "previously published|already exists|EPUBLISHCONFLICT|cannot publish over"; then
                echo "Version already published, skipping $name."
              else
                echo "::error::Failed to publish $name"
                echo "::endgroup::"
                return 1
              fi
            fi
            echo "::endgroup::"
          }

          publish_pkg packages/abstractions
          publish_pkg plugins/filesystem
          publish_pkg plugins/filesystem-json
          publish_pkg plugins/filesystem-sqlite
          publish_pkg plugins/filesystem-s3
          publish_pkg plugins/weather
          publish_pkg plugins/jobs
          publish_pkg plugins/admin
          publish_pkg .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
